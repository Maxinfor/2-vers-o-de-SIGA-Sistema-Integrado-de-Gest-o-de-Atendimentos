<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Atendimentos - Políticas Públicas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <h2>Cadastro de Atendimento</h2>
    <form id="formAtendimento" class="row g-3">
        <!-- Campos baseados na sua imagem -->
        <div class="col-md-3"><label>Data</label><input type="date" class="form-control" name="data"></div>
        <div class="col-md-3"><label>Nome</label><input type="text" class="form-control" name="nome"></div>
        <div class="col-md-3"><label>Data de Nascimento</label><input type="date" class="form-control" name="dn"></div>
        <div class="col-md-3"><label>Responsável</label><input type="text" class="form-control" name="responsavel"></div>
        <!-- Adicione os outros campos seguindo o mesmo padrão -->
        <div class="col-12">
            <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
    </form>

    <hr>
    <h3>Gerenciamento de Atendimentos</h3>
    <input type="text" id="pesquisa" class="form-control mb-3" placeholder="Pesquisar...">
    <table class="table table-striped">
        <thead>
            <tr><th>Nome</th><th>Assunto</th><th>Localidade</th><th>Ações</th></tr>
        </thead>
        <tbody id="tabelaDados"></tbody>
    </table>
</body>
</html>
